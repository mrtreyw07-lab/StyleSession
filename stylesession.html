    const cssVars = new Map();

    // Extract CSS custom properties from :root
    const rootStyles = window.getComputedStyle(document.documentElement);
    for (const sheet of document.styleSheets) {
      try {
        for (const rule of sheet.cssRules) {
          if (rule.selectorText === ':root' || rule.selectorText === 'html') {
            for (let i = 0; i < rule.style.length; i++) {
              const prop = rule.style[i];
              if (prop.startsWith('--') && !prop.startsWith('--vi-')) {
                cssVars.set(prop, rule.style.getPropertyValue(prop).trim());
              }
            }
          }
        }
      } catch (e) { /* cross-origin sheet */ }
    }

    allEls.forEach(el => {
      if (el.closest('#__vi-root')) return;
      const cs = window.getComputedStyle(el);
      const c = rgb2hex(cs.color);
      const bg = rgb2hex(cs.backgroundColor);
      if (cs.color && cs.color !== 'rgba(0, 0, 0, 0)') colors.set(c, (colors.get(c) || 0) + 1);
      if (cs.backgroundColor && cs.backgroundColor !== 'rgba(0, 0, 0, 0)' && cs.backgroundColor !== 'transparent') colors.set(bg, (colors.get(bg) || 0) + 1);
      if (cs.fontFamily) {
        const fam = cs.fontFamily.replace(/"/g, '').split(',')[0].trim();
        fonts.set(fam, (fonts.get(fam) || 0) + 1);
      }
      ['marginTop','marginBottom','paddingTop','paddingBottom','gap'].forEach(p => {
        const v = cs[p];
        if (v && v !== '0px' && v !== 'normal') spacings.set(v, (spacings.get(v) || 0) + 1);
      });
    });

    const sortedColors = [...colors.entries()].sort((a, b) => b[1] - a[1]);
    const sortedFonts = [...fonts.entries()].sort((a, b) => b[1] - a[1]);
    const sortedSpacings = [...spacings.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);

    let colorHtml = sortedColors.map(([c, n]) => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer;" class="__vi-token-color" data-val="${escAttr(c)}"><div style="width:16px;height:16px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.2);flex-shrink:0;"></div><span>${escAttr(c)}</span><span style="opacity:0.4;font-size:9px;margin-left:auto;">×${n}</span></div>`).join('');
    let fontHtml = sortedFonts.map(([f, n]) => `<div style="margin-bottom:4px;display:flex;justify-content:space-between;"><span style="font-family:${escAttr(f)};color:var(--vi-text);">${escAttr(f)}</span><span style="opacity:0.4;font-size:9px;">×${n}</span></div>`).join('');
    let spacingHtml = sortedSpacings.map(([s, n]) => `<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span>${escAttr(s)}</span><span style="opacity:0.4;font-size:9px;">×${n}</span></div>`).join('');
    let varsHtml = [...cssVars.entries()].map(([k, v]) => `<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;font-size:10px;" class="__vi-var-row">
      <span style="color:var(--vi-accent);flex-shrink:0;min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escAttr(k)}">${escAttr(k)}</span>
      <input class="__vi-input __vi-var-input" data-varname="${escAttr(k)}" value="${escAttr(v)}" style="flex:1;font-size:10px;padding:2px 4px;">
    </div>`).join('');

    content.innerHTML = `<div class="__vi-panel-body-wrapper">
      <div class="__vi-section"><div class="__vi-section-title">COLORS (${sortedColors.length})</div><div style="max-height:150px;overflow-y:auto;">${colorHtml || 'None'}</div></div>
      <div class="__vi-section"><div class="__vi-section-title">FONTS (${sortedFonts.length})</div><div style="max-height:100px;overflow-y:auto;">${fontHtml || 'None'}</div></div>
      <div class="__vi-section"><div class="__vi-section-title">SPACINGS</div><div style="max-height:100px;overflow-y:auto;">${spacingHtml || 'None'}</div></div>
      ${varsHtml ? `<div class="__vi-section"><div class="__vi-section-title">CSS VARIABLES (editable)</div><div style="max-height:160px;overflow-y:auto;">${varsHtml}</div></div>` : ''}
    </div>`;

    // Click to copy color token
    content.querySelectorAll('.__vi-token-color').forEach(row => {
      row.addEventListener('click', () => copyText(row.dataset.val));
    });

    // Editable CSS variables
    content.querySelectorAll('.__vi-var-input').forEach(input => {
      input.addEventListener('change', () => {
        const varName = input.dataset.varname;
        const newVal = input.value;
        const el = document.documentElement;
        const oldVal = el.style.getPropertyValue(varName) || window.getComputedStyle(el).getPropertyValue(varName) || '';
        if (!state.originalStyles.has(el)) state.originalStyles.set(el, new Map());
        const origMap = state.originalStyles.get(el);
        if (!origMap.has(varName)) origMap.set(varName, oldVal);
        el.style.setProperty(varName, newVal);
        state.undoStack.push({ el, prop: varName, oldVal, newVal });
        state.redoStack = [];
        updateUndoRedoUI();
        showToast(`${varName} updated`, 'success');
      });
    });
  }

  // INPUT HANDLERS (shared)

  // Returns the display value for a CSS property across multi-selected elements.
  // If all selected elements have the same value, returns that value.
  // If values differ, returns '' and sets the placeholder attribute on the input.
  function multiVal(prop) {
    if (state.selectedEls.length <= 1) return null; // use normal computed value
    const vals = state.selectedEls.map(el => window.getComputedStyle(el)[prop]);
    return vals.every(v => v === vals[0]) ? null : ''; // null = not mixed, '' = mixed
  }

  function attachInputHandlers(el) {
    const inputs = state.ui.panelContent.querySelectorAll('input[data-prop], select[data-prop]');
    inputs.forEach(input => {
      // Mark mixed-value inputs when multi-selecting
      if (state.selectedEls.length > 1) {
        const prop = input.getAttribute('data-prop');
        const mv = multiVal(prop);
        if (mv !== null) {
          if (input.tagName === 'INPUT') {
            input.value = '';
            input.placeholder = '(mixed)';
            input.style.fontStyle = 'italic';
            input.style.opacity = '0.7';
          }
        }
      }
      input.addEventListener('change', (e) => {
        const prop = input.getAttribute('data-prop');
        const val = e.target.value;
        if (input.getAttribute('data-googlefont') === 'true' && val.includes("', sans-serif")) {
          const fontName = val.split("'")[1];
          if (fontName && !document.getElementById('__vi-font-' + fontName.replace(/\s+/g, ''))) {
            const s = document.createElement('style');
            s.id = '__vi-font-' + fontName.replace(/\s+/g, '');
            s.textContent = `@import url('https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}:wght@100..900&display=swap');`;
            document.head.appendChild(s);
          }
        }
        state.selectedEls.forEach(t => applyChange(t, prop, val));
      });
      if (input.type === 'range' || input.type === 'color') {
        let startVals = new Map();
        const captureStartVals = () => {
          const prop = input.getAttribute('data-prop');
          state.selectedEls.forEach(t => {
            const inline = t.style[prop];
            const computed = window.getComputedStyle(t)[prop];
            startVals.set(t, inline || computed || '');
          });
        };
        input.addEventListener('pointerdown', () => {
          captureStartVals();
        });
        input.addEventListener('keydown', (e) => {
          if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'PageUp', 'PageDown'].includes(e.key) && startVals.size === 0) {
            captureStartVals();
          }
        });
        input.addEventListener('input', (e) => {
          state.selectedEls.forEach(t => t.style[input.getAttribute('data-prop')] = e.target.value);
        });
        input.addEventListener('change', (e) => {
          const prop = input.getAttribute('data-prop');
          if (startVals.size === 0) captureStartVals();
          state.selectedEls.forEach(t => {
            const prev = startVals.has(t) ? startVals.get(t) : (t.style[prop] || window.getComputedStyle(t)[prop] || '');
            t.style[prop] = prev;
            applyChange(t, prop, e.target.value);
          });
          startVals.clear();
        });
      }
    });
  }

  function bindCopyButtons(container) {
    container.querySelectorAll('.__vi-copy-btn[data-copy]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        copyText(btn.dataset.copy);
      });
    });
  }

  // ============================================================
  // CSS EXPORT
  // ============================================================
  function bindExport() {
    document.getElementById('__vi-btn-export').addEventListener('click', () => generateCSSExport(false));
  }

  function generateCSSExport(saveOnly = false) {
    let css = "/* 🔮 StyleSession Export */\n\n";
    const changes = collectSessionChanges();
    let count = 0;
    changes.forEach(change => {
      const entries = Object.entries(change.styles);
      if (!entries.length) return;
      const block = entries.map(([p, v]) => `  ${p}: ${v};`).join('\n');
      css += `${change.selector} {\n${block}\n}\n\n`;
      count++;
    });
    if (saveOnly) {
      // Collect annotations
      const notes = [];
      document.querySelectorAll('.__vi-note').forEach(note => {
        const ta = note.querySelector('textarea');
        if (ta && ta.value.trim()) {
          notes.push({ x: note.style.left, y: note.style.top, text: ta.value });
        }
      });
      // Collect injected CSS
      const injectedStyle = document.getElementById('__vi-injected-css');
      const injectedCSS = injectedStyle ? injectedStyle.textContent : '';
      // Collect text edits
      const textChanges = collectTextChanges();
      const hasData = count > 0 || notes.length > 0 || injectedCSS || textChanges.length > 0;
      if (hasData) {
        const payload = {
          version: 2,
          date: new Date().toISOString(),
          changes,
          css
        };
        if (notes.length > 0) payload.notes = notes;
        if (injectedCSS) payload.injectedCSS = injectedCSS;
        if (textChanges.length > 0) payload.textChanges = textChanges;
        localStorage.setItem('__vi_session', JSON.stringify(payload));
        showToast('Session saved', 'success');
      }
      else showToast('Nothing to save', 'warn');
      return;
    }
    if (count === 0) { showToast('No changes to export!', 'warn'); return; }
    navigator.clipboard.writeText(css).then(() => { showToast('CSS copied to clipboard!', 'success'); }).catch(() => showToast('Copy failed', 'error'));
  }

  // ============================================================
  // KEYBOARD SHORTCUTS
  // ============================================================
  function bindKeyboardEvents() {
    window.addEventListener('keydown', (e) => {
      if (!state.active) {
        // Allow re-enable with Ctrl+Shift+I
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'i') { togglePower(); e.preventDefault(); }
        return;
      }
      // Don't intercept when typing in inputs (except Escape)
      const inInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT';
      if (inInput && e.key !== 'Escape') return;

      // Escape: close palette first, then clear selection
      if (e.key === 'Escape') {
        if (paletteOpen) { togglePalette(true); e.preventDefault(); e.stopPropagation(); return; }
        if (state.ui.confirmModal.classList.contains('open')) { closeResetConfirm(); e.preventDefault(); return; }
        if (state.ui.shortcutsModal.classList.contains('open')) { state.ui.shortcutsModal.classList.remove('open'); e.preventDefault(); return; }
        if (state.ui.contextMenu.classList.contains('open')) { state.ui.contextMenu.classList.remove('open'); e.preventDefault(); return; }
        clearSelection();
        return;
      }

      // Ctrl+S save
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 's') { e.preventDefault(); generateCSSExport(true); return; }
      // Ctrl+Shift+E export
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'e') { e.preventDefault(); generateCSSExport(false); return; }
      // Ctrl+Z / Ctrl+Shift+Z
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); return; }
      // Ctrl+Alt+C copy styles, Ctrl+Alt+V paste styles
      if ((e.ctrlKey || e.metaKey) && e.altKey && e.key.toLowerCase() === 'c') { e.preventDefault(); copyElementStyles(); return; }
      if ((e.ctrlKey || e.metaKey) && e.altKey && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteElementStyles(); return; }

      // Shift combos
      if (e.shiftKey && !e.ctrlKey && !e.metaKey) {
        const k = e.key.toLowerCase();
        if (k === 'r') { e.preventDefault(); toggleRulers(); return; }
        if (k === 'l') { e.preventDefault(); toggleLayoutInspector(); return; }
        if (k === 'a') { e.preventDefault(); toggleA11yInspector(); return; }
        if (k === 'd') { e.preventDefault(); toggleDarkMode(); return; }
        if (k === 'm') { e.preventDefault(); toggleMobileView(); return; }
        if (k === 'n') { e.preventDefault(); toggleAnnotations(); return; }
        if (k === 'c') { e.preventDefault(); toggleCompare(); return; }
        if (k === 'p') { e.preventDefault(); togglePalette(); return; }
        if (k === 's') { e.preventDefault(); toggleSnapshot(); return; }
      }

      // ? for shortcuts
      if (e.key === '?') { e.preventDefault(); toggleShortcutsModal(); return; }

      // Arrow nudge in Move tool
      if (state.selectedEls.length > 0 && state.currentTool === 'move' && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        const target = state.selectedEls[0];
        const cs = window.getComputedStyle(target);
        if (cs.position === 'static') applyChange(target, 'position', 'relative');
        ensureMoveElevation(target);
        const t = parseFloat(target.style.top || cs.top) || 0;
        const l = parseFloat(target.style.left || cs.left) || 0;
        const step = e.shiftKey ? 10 : 1;
        if (e.key === 'ArrowUp') applyChange(target, 'top', (t - step) + 'px');
        if (e.key === 'ArrowDown') applyChange(target, 'top', (t + step) + 'px');
        if (e.key === 'ArrowLeft') applyChange(target, 'left', (l - step) + 'px');
        if (e.key === 'ArrowRight') applyChange(target, 'left', (l + step) + 'px');
        renderPanelForCurrentTool();
        return;
      }

      // Delete selected element
      if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedEls.length > 0 && !inInput) {
        e.preventDefault();
        state.selectedEls.forEach(el => {
          applyChange(el, 'display', 'none');
        });
        showToast('Element(s) hidden (undoable)', 'warn');
        clearSelection();
        return;
      }

      // Tool shortcuts
      const toolMap = { 'v':'select','q':'browse','m':'move','s':'spacing','t':'typography','f':'color','b':'border','e':'effects','o':'animation','k':'tokens','g':'shape' };
      if (!e.ctrlKey && !e.metaKey && !e.shiftKey && toolMap[e.key.toLowerCase()]) {
        setTool(toolMap[e.key.toLowerCase()]);
        return;
      }
    });
  }

        ${shortcutRow('K','Design Tokens')}${shortcutRow('G','Shape Tool')}${shortcutRow('Ctrl+Z','Undo')}${shortcutRow('Ctrl+Shift+Z','Redo')}

  function shortcutRow(key, desc) {
    return `<div class="__vi-shortcut-row"><span>${desc}</span><span class="key">${key}</span></div>`;

  // ============================================================
  // CONTEXT MENU (right-click)
  // ============================================================
  function bindContextMenu() {
    window.addEventListener('contextmenu', (e) => {
      if (!state.active) return;
      if (e.target.closest('#__vi-root')) return;
      if (state.selectedEls.length === 0 && !state.hoveredEl) return;
      e.preventDefault();
      const target = state.selectedEls[0] || state.hoveredEl;
      if (!state.selectedEls.includes(target)) selectElement(target);
      const menu = state.ui.contextMenu;
      menu.innerHTML = `
        <button class="__vi-ctx-item" data-action="copy-selector">⧉ Copy Selector</button>
        <button class="__vi-ctx-item" data-action="copy-styles">📋 Copy Computed Styles</button>
        <button class="__vi-ctx-item" data-action="copy-html">📄 Copy Outer HTML</button>
        <div class="__vi-ctx-sep"></div>
        <button class="__vi-ctx-item" data-action="select-siblings">👥 Select All Siblings</button>
        <button class="__vi-ctx-item" data-action="select-parent">↑ Select Parent</button>
        <button class="__vi-ctx-item" data-action="scroll-parent">📍 Scroll Parent Into View</button>
        <div class="__vi-ctx-sep"></div>
        <button class="__vi-ctx-item" data-action="hide">🚫 Hide Element</button>
      `;
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      menu.classList.add('open');

      menu.querySelectorAll('.__vi-ctx-item').forEach(item => {
        item.addEventListener('click', () => {
          const action = item.dataset.action;
          if (action === 'copy-selector') copyText(generateElementPath(target));
          else if (action === 'copy-styles') {
            const cs = window.getComputedStyle(target);
            const props = ['display','position','width','height','margin','padding','color','background-color','font-family','font-size','font-weight','border','border-radius','box-shadow'];
            const text = props.map(p => `${p}: ${cs.getPropertyValue(p)};`).join('\n');
            copyText(text);
          }
          else if (action === 'copy-html') copyText(target.outerHTML);
          else if (action === 'select-siblings') {
            const parent = target.parentElement;
            if (parent) {
              const siblings = Array.from(parent.children).filter(c => !c.closest('#__vi-root'));
              state.selectedEls = siblings;
              state.ui.panelTarget.textContent = `${siblings.length} siblings selected`;
              state.ui.panel.classList.add('open');
              renderPanelForCurrentTool();
            }
          }
          else if (action === 'select-parent') {
            if (target.parentElement && target.parentElement !== document.body) selectElement(target.parentElement);
          }
          else if (action === 'scroll-parent') {
            if (target.parentElement) target.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
          else if (action === 'hide') {
            applyChange(target, 'display', 'none');
            showToast('Element hidden (undoable)', 'warn');
            clearSelection();
          }
          menu.classList.remove('open');
        });
      });
    });
    // Close context menu on click elsewhere
    window.addEventListener('click', () => state.ui.contextMenu.classList.remove('open'));
  }

  // ============================================================
  // DRAGGING (MOVE TOOL)
  // ============================================================
  let isDraggingEl = false, dragStart = { x: 0, y: 0 }, initialPos = { top: 0, left: 0 };
  let _moveRAF = 0, _moveDX = 0, _moveDY = 0;
  let _moveDragCommitted = false; // true once we exceed the dead-zone threshold
  let _moveTarget = null;         // cached target during drag
  let _moveOrigTransform = '';    // preserve existing CSS transform during drag
  let _moveOrigTransition = '';   // preserve existing CSS transition to restore after drag
  let _moveOrigAnimation = '';    // preserve existing CSS animation to restore after drag

  function _moveMouseDown(e) {
    if (!state.active || state.currentTool !== 'move') return;
    if (e.target.closest('#__vi-root')) return;
    e.preventDefault();

    // Resolve the drag target: use current selection if click is inside it,
    // otherwise auto-select the element under cursor (grab-and-drag in one motion).
    let target;
    if (state.selectedEls.length > 0 && (e.target === state.selectedEls[0] || state.selectedEls[0].contains(e.target))) {
      target = state.selectedEls[0];
    } else {
      // Auto-select whatever the user pressed on
      let el = e.target;
      if (el === document.body || el === document.documentElement) return;
      selectElement(el);
      target = el;
    }

    _moveTarget = target;
    isDraggingEl = true;
    _moveDragCommitted = false;
    _moveDX = 0; _moveDY = 0;
    dragStart.x = e.clientX; dragStart.y = e.clientY;

    // Read initial position ONCE (single getComputedStyle call)
    const cs = window.getComputedStyle(target);
    initialPos.top = parseFloat(target.style.top || cs.top) || 0;
    initialPos.left = parseFloat(target.style.left || cs.left) || 0;

    window.addEventListener('mousemove', _moveMouseMove);
    window.addEventListener('mouseup', _moveMouseUp);
  }

  // Threshold in px before we commit to a drag (avoids accidental micro-drags on click)
  const _MOVE_DEAD_ZONE = 3;

  function _moveCommitDrag() {
    if (_moveDragCommitted || !_moveTarget) return;
    _moveDragCommitted = true;
    const target = _moveTarget;

    // Prepare the element for GPU-accelerated movement
    const cs = window.getComputedStyle(target);
    if (cs.position === 'static') applyChange(target, 'position', 'relative');
    ensureMoveElevation(target);

    // Capture and neutralize existing transform, transition, AND animation so
    // the drag is instant. CSS animations override normal inline styles, so we
    // must freeze them and use !important to guarantee our transform wins.
    _moveOrigTransform = cs.transform && cs.transform !== 'none' ? cs.transform : '';
    _moveOrigTransition = target.style.getPropertyValue('transition');
    _moveOrigAnimation = target.style.getPropertyValue('animation');
    target.style.setProperty('transition', 'none', 'important');
    target.style.setProperty('animation', 'none', 'important');
    target.style.willChange = 'transform';
    target.style.cursor = 'grabbing';

    // Hide overlays during drag and pause costly hover tracking
    state.ui.hoverOverlay.classList.remove('active');
    state.ui.marginOverlay.classList.remove('active');
    state.ui.paddingOverlay.classList.remove('active');
    document.querySelectorAll('.__vi-overlay-select').forEach(o => o.classList.remove('active'));
    state.ui.label.classList.remove('active');
    clearMeasurements();
  }

  function _moveMouseMove(e) {
    if (!isDraggingEl) return;
    _moveDX = e.clientX - dragStart.x;
    _moveDY = e.clientY - dragStart.y;

    // Dead-zone: don't start visual drag until threshold is passed
    if (!_moveDragCommitted) {
      if (Math.abs(_moveDX) < _MOVE_DEAD_ZONE && Math.abs(_moveDY) < _MOVE_DEAD_ZONE) return;
      _moveCommitDrag();
    }

    if (!_moveRAF) {
      _moveRAF = requestAnimationFrame(() => {
        _moveRAF = 0;
        if (!_moveTarget || !isDraggingEl) return;
        // Compose drag translation with the element's original transform.
        // Use !important to override CSS animations and stylesheet rules.
        const drag = `translate(${_moveDX}px, ${_moveDY}px)`;
        const val = _moveOrigTransform ? drag + ' ' + _moveOrigTransform : drag;
        _moveTarget.style.setProperty('transform', val, 'important');
      });
    }
  }

  function _moveMouseUp() {
    window.removeEventListener('mousemove', _moveMouseMove);
    window.removeEventListener('mouseup', _moveMouseUp);
    if (!isDraggingEl) return;
    isDraggingEl = false;
    if (_moveRAF) { cancelAnimationFrame(_moveRAF); _moveRAF = 0; }
    const target = _moveTarget;
    _moveTarget = null;
    if (!target) return;

    if (_moveDragCommitted) {
      // Remove !important overrides and restore originals
      target.style.removeProperty('transform');
      target.style.removeProperty('transition');
      target.style.removeProperty('animation');
      if (_moveOrigTransform) target.style.transform = _moveOrigTransform;
      if (_moveOrigTransition) target.style.transition = _moveOrigTransition;
      if (_moveOrigAnimation) target.style.animation = _moveOrigAnimation;
      target.style.willChange = '';
      target.style.cursor = '';
      const nl = (initialPos.left + _moveDX) + 'px';
      const nt = (initialPos.top + _moveDY) + 'px';
      applyChange(target, 'left', nl);
      applyChange(target, 'top', nt);
    }
    _moveOrigTransform = '';
    _moveOrigTransition = '';
    _moveOrigAnimation = '';
    _moveDragCommitted = false;
    renderPanelForCurrentTool();
  }

  function ensureMoveElevation(el) {
    // 1. Clear overflow clipping on ancestors (single getComputedStyle per ancestor)
    let cur = el.parentElement;
    while (cur && cur !== document.body && cur !== document.documentElement) {
      const cs = window.getComputedStyle(cur);
      if (cs.overflow === 'hidden' || cs.overflow === 'clip' || cs.overflow === 'auto' || cs.overflow === 'scroll') {
        applyChange(cur, 'overflow', 'visible');
      } else {
        if (cs.overflowX === 'hidden' || cs.overflowX === 'clip') applyChange(cur, 'overflowX', 'visible');
        if (cs.overflowY === 'hidden' || cs.overflowY === 'clip') applyChange(cur, 'overflowY', 'visible');
      }
      cur = cur.parentElement;
    }

    // 2. Elevate the element itself
    const cs = window.getComputedStyle(el);
    if (cs.zIndex === 'auto' || parseInt(cs.zIndex, 10) < 1) {
      applyChange(el, 'zIndex', '1');
    }

    // 3. Elevate nearest top-level ancestor so it stacks above sibling sections
    let ancestor = el.parentElement;
    while (ancestor && ancestor !== document.body && ancestor !== document.documentElement) {
      const parent = ancestor.parentElement;
      if (!parent || parent === document.body || parent === document.documentElement) {
        const aCS = window.getComputedStyle(ancestor);
        if (aCS.position === 'static') applyChange(ancestor, 'position', 'relative');
        if (aCS.zIndex === 'auto' || parseInt(aCS.zIndex, 10) < 1) applyChange(ancestor, 'zIndex', '1');
        break;
      }
      ancestor = parent;
    }
  }

  function bindMoveEvents() {
    window.addEventListener('mousedown', _moveMouseDown);
  }

  // ============================================================
  // SHAPE TOOL
  // ============================================================
  let _shapeDrawing = false, _shapeStart = { x: 0, y: 0 };
  let _shapePreview = null;
  let _shapeCount = 0;

  function _shapeCleanup() {
    _shapeDrawing = false;
    if (_shapePreview) { _shapePreview.classList.remove('active'); }
  }

  function bindShapeEvents() {
    // Create the preview element once
    _shapePreview = document.createElement('div');
    _shapePreview.className = '__vi-shape-preview';
    state.ui.root.appendChild(_shapePreview);

    window.addEventListener('mousedown', (e) => {
      if (!state.active || state.currentTool !== 'shape') return;
      if (e.target.closest('#__vi-root')) return;
      // If clicking on an existing shape, select it instead of drawing
      if (e.target.classList.contains('__vi-shape')) {
        selectElement(e.target);
        setTool('shape');
        e.preventDefault();
        return;
      }
      e.preventDefault();
      _shapeDrawing = true;
      _shapeStart.x = e.clientX + window.scrollX;
      _shapeStart.y = e.clientY + window.scrollY;
      _shapePreview.style.left = _shapeStart.x + 'px';
      _shapePreview.style.top = _shapeStart.y + 'px';
      _shapePreview.style.width = '0px';
      _shapePreview.style.height = '0px';
      _shapePreview.classList.add('active');
    });

    window.addEventListener('mousemove', (e) => {
      if (!_shapeDrawing) return;
      const cx = e.clientX + window.scrollX;
      const cy = e.clientY + window.scrollY;
      const x = Math.min(_shapeStart.x, cx);
      const y = Math.min(_shapeStart.y, cy);
      const w = Math.abs(cx - _shapeStart.x);
      const h = Math.abs(cy - _shapeStart.y);
      _shapePreview.style.left = x + 'px';
      _shapePreview.style.top = y + 'px';
      _shapePreview.style.width = w + 'px';
      _shapePreview.style.height = h + 'px';
    });

    window.addEventListener('mouseup', (e) => {
      if (!_shapeDrawing) return;
      _shapeDrawing = false;
      _shapePreview.classList.remove('active');

      const cx = e.clientX + window.scrollX;
      const cy = e.clientY + window.scrollY;
      const x = Math.min(_shapeStart.x, cx);
      const y = Math.min(_shapeStart.y, cy);
      const w = Math.abs(cx - _shapeStart.x);
      const h = Math.abs(cy - _shapeStart.y);

      // Minimum size threshold to avoid accidental micro-shapes
      if (w < 10 || h < 10) return;

      _shapeCount++;
      const shape = document.createElement('div');
      shape.className = '__vi-shape';
      shape.dataset.stylesessionShape = 'true';
      shape.dataset.shapeId = 'shape-' + _shapeCount;
      shape.style.cssText = `
        position: absolute;
        left: ${x}px;
        top: ${y}px;
        width: ${w}px;
        height: ${h}px;
        background: rgba(0, 229, 204, 0.08);
        border: 2px dashed rgba(0, 229, 204, 0.5);
        border-radius: 0px;
        box-sizing: border-box;
        z-index: 10;
      `;
      document.body.appendChild(shape);

      // Track in undo system so it can be removed
      applyChange(shape, 'position', 'absolute');

      // Auto-select the new shape and show its panel
      selectElement(shape);
      showToast(`Shape #${_shapeCount} created`, 'success');
    });
  }

          applyChange(el, 'width', size);

  function _updateShapeCSSOutput(el) {
    const textarea = document.getElementById('__vi-shape-css-out');
    if (!textarea) return;
    const cs = window.getComputedStyle(el);
    const props = [
      'position', 'left', 'top', 'width', 'height',
      'background', 'background-color', 'border', 'border-radius',
      'box-shadow', 'opacity', 'z-index', 'backdrop-filter'
    ];
    let css = '.my-container {\n';
    props.forEach(p => {
      const k = p.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
      let v = el.style[k];
      if (!v || v === 'none' || v === 'auto') {
        v = cs.getPropertyValue(p);
      }
      if (v && v !== 'none' && v !== 'auto' && v !== '' && v !== 'rgba(0, 0, 0, 0)') {
        css += `  ${p}: ${v};\n`;
      }
    });
    css += '}';
    textarea.value = css;
  }

  // ============================================================
  // RULERS & GUIDES
  // ============================================================
  let _rulersRAF = 0;
  function drawRulers() {
    if (!state.features.rulers) return;
    if (_rulersRAF) return;
    _rulersRAF = requestAnimationFrame(() => {
    const tc = document.querySelector('#__vi-ruler-top canvas');
    const lc = document.querySelector('#__vi-ruler-left canvas');
    if (!tc || !lc) return;
    tc.width = window.innerWidth; tc.height = 24;
    lc.width = 24; lc.height = window.innerHeight;
    const ctxT = tc.getContext('2d'), ctxL = lc.getContext('2d');
    ctxT.clearRect(0, 0, tc.width, 24); ctxL.clearRect(0, 0, 24, lc.height);
    ctxT.fillStyle = ctxL.fillStyle = '#8a8a9a';
    ctxT.font = ctxL.font = '9px sans-serif';
    const sx = window.scrollX, sy = window.scrollY;
    for (let x = 0; x < window.innerWidth + sx; x += 10) {
      const s = x - sx; if (s < 0) continue;
      if (x % 100 === 0) { ctxT.fillRect(s, 0, 1, 24); ctxT.fillText(x + '', s + 3, 16); }
      else if (x % 50 === 0) ctxT.fillRect(s, 12, 1, 12);
      else ctxT.fillRect(s, 18, 1, 6);
    }
    for (let y = 0; y < window.innerHeight + sy; y += 10) {
      const s = y - sy; if (s < 0) continue;
      if (y % 100 === 0) { ctxL.fillRect(0, s, 24, 1); ctxL.save(); ctxL.translate(16, s + 5); ctxL.rotate(-Math.PI / 2); ctxL.fillText(y + '', 0, 0); ctxL.restore(); }
      else if (y % 50 === 0) ctxL.fillRect(12, s, 12, 1);
      else ctxL.fillRect(18, s, 6, 1);
    }
    });
  }

  function toggleRulers() {
    state.features.rulers = !state.features.rulers;
    const t = document.getElementById('__vi-ruler-top'), l = document.getElementById('__vi-ruler-left');
    if (state.features.rulers) {
      t.classList.add('active'); l.classList.add('active');
      drawRulers();
      window.addEventListener('scroll', drawRulers, { passive: true });
      window.addEventListener('resize', drawRulers, { passive: true });
    } else {
      t.classList.remove('active'); l.classList.remove('active');
      window.removeEventListener('scroll', drawRulers);
      window.removeEventListener('resize', drawRulers);
    }
    updateFeatureDots();
    showToast(state.features.rulers ? 'Rulers On' : 'Rulers Off');
  }

  function bindGuides() {
    document.getElementById('__vi-ruler-top').addEventListener('mousedown', (e) => startGuideDrag(e, 'h'));
    document.getElementById('__vi-ruler-left').addEventListener('mousedown', (e) => startGuideDrag(e, 'v'));
  }

  function startGuideDrag(e, dir) {
    if (!state.features.rulers) return;
    const guide = document.createElement('div');
    guide.className = `__vi-guide __vi-guide-${dir}`;
    document.getElementById('__vi-guides-container').appendChild(guide);
    const move = (me) => { if (dir === 'h') guide.style.top = me.clientY + 'px'; else guide.style.left = me.clientX + 'px'; };
    move(e);
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      guide.addEventListener('mousedown', (ge) => {
        ge.stopPropagation();
        const gm = (me) => { if (dir === 'h') guide.style.top = me.clientY + 'px'; else guide.style.left = me.clientX + 'px'; };
        const gu = () => {
          window.removeEventListener('mousemove', gm);
          window.removeEventListener('mouseup', gu);
          const r = guide.getBoundingClientRect();
          if ((dir === 'h' && r.top < 24) || (dir === 'v' && r.left < 24)) guide.remove();
        };
        window.addEventListener('mousemove', gm);
        window.addEventListener('mouseup', gu);
      });
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }

  // ============================================================
  // LAYOUT INSPECTOR
  // ============================================================
  let layoutStyleEl = null;
  function toggleLayoutInspector() {
    state.features.layout = !state.features.layout;
    if (state.features.layout) {
      layoutStyleEl = document.createElement('style');
      layoutStyleEl.id = '__vi-layout-style';
      layoutStyleEl.textContent = `.__vi-layout-flex,.__vi-layout-grid{position:relative;outline:1px dashed #D7007F!important}.__vi-layout-flex::before{content:'FLEX';position:absolute;top:-14px;left:0;background:#D7007F;color:#fff;font-size:9px;padding:2px 4px;z-index:2147483600;font-family:sans-serif}.__vi-layout-grid::before{content:'GRID';position:absolute;top:-14px;left:0;background:#00E5CC;color:#000;font-size:9px;padding:2px 4px;z-index:2147483600;font-family:sans-serif}.__vi-layout-grid{outline:1px dashed #00E5CC!important}`;
      document.head.appendChild(layoutStyleEl);
      document.querySelectorAll('*').forEach(el => {
        if (el.closest('#__vi-root')) return;
        const d = window.getComputedStyle(el).display;
        if (d === 'flex' || d === 'inline-flex') el.classList.add('__vi-layout-flex');
        if (d === 'grid' || d === 'inline-grid') el.classList.add('__vi-layout-grid');

      if (layoutStyleEl) layoutStyleEl.remove();
      document.querySelectorAll('.__vi-layout-flex,.__vi-layout-grid').forEach(el => el.classList.remove('__vi-layout-flex', '__vi-layout-grid'));

  // ============================================================
  // A11Y CHECKER (enhanced — contrast + missing attrs)
  // ============================================================
  let a11yStyleEl = null;
  function toggleA11yInspector() {
    state.features.a11y = !state.features.a11y;
    if (state.features.a11y) {
      a11yStyleEl = document.createElement('style');
      a11yStyleEl.id = '__vi-a11y-style';
      a11yStyleEl.textContent = `.__vi-a11y-error{outline:2px solid #ff4757!important;position:relative}.__vi-a11y-warn{outline:2px solid #ffa502!important;position:relative}.__vi-a11y-error::after{content:attr(data-vi-a11y);position:absolute;top:-14px;left:0;background:#ff4757;color:#fff;font-size:9px;padding:2px 4px;z-index:2147483600;font-family:sans-serif;white-space:nowrap}.__vi-a11y-warn::after{content:attr(data-vi-a11y);position:absolute;top:-14px;left:0;background:#ffa502;color:#000;font-size:9px;padding:2px 4px;z-index:2147483600;font-family:sans-serif;white-space:nowrap}`;
      document.head.appendChild(a11yStyleEl);
      let errors = 0, warnings = 0;

      // Missing alt
      document.querySelectorAll('img:not([alt]), img[alt=""]').forEach(el => {
        el.classList.add('__vi-a11y-error'); el.setAttribute('data-vi-a11y', 'Missing alt'); errors++;
      });
      // Missing aria-label on interactive elements without text
      document.querySelectorAll('button:not([aria-label]), a:not([aria-label])').forEach(el => {
        if (el.closest('#__vi-root')) return;
        if (!el.textContent.trim() && !el.getAttribute('aria-label')) {
          el.classList.add('__vi-a11y-warn'); el.setAttribute('data-vi-a11y', 'No label'); warnings++;
        }
      });
      // Low contrast text
      document.querySelectorAll('p, h1, h2, h3, h4, h5, h6, span, a, li, td, th, label, button').forEach(el => {
        if (el.closest('#__vi-root')) return;
        const fg = window.getComputedStyle(el).color;
        const bg = getEffectiveBgColor(el);
        const ratio = contrastRatio(fg, bg);
        if (ratio < 3) {
          el.classList.add('__vi-a11y-error'); el.setAttribute('data-vi-a11y', `Contrast ${ratio.toFixed(1)}:1`); errors++;
        } else if (ratio < 4.5) {
          el.classList.add('__vi-a11y-warn'); el.setAttribute('data-vi-a11y', `Low contrast ${ratio.toFixed(1)}:1`); warnings++;
        }
      });
      showToast(`A11y: ${errors} error(s), ${warnings} warning(s)`, errors > 0 ? 'error' : warnings > 0 ? 'warn' : 'success');
    } else {
      if (a11yStyleEl) a11yStyleEl.remove();
      document.querySelectorAll('.__vi-a11y-error,.__vi-a11y-warn').forEach(el => {
        el.classList.remove('__vi-a11y-error', '__vi-a11y-warn');
        el.removeAttribute('data-vi-a11y');
      });
      showToast('A11y Off');
    }
    updateFeatureDots();
  }

  // ============================================================
  // DARK MODE & MOBILE VIEW
  // ============================================================
  let _darkModeSavedStyles = null;
  function toggleDarkMode() {
    state.features.dark = !state.features.dark;
    if (state.features.dark) {
      // Save original inline styles before overriding
      _darkModeSavedStyles = {
        colorScheme: document.documentElement.style.colorScheme || '',
        bodyBg: document.body.style.backgroundColor || '',
        bodyColor: document.body.style.color || ''
      };
      // Inject prefers-color-scheme: dark override
      let darkStyle = document.getElementById('__vi-dark-override');
      if (!darkStyle) {

  // ── Mobile Preview ──────────────────────────────────────────
  const MOBILE_DEVICES = [
    { id: 'iphone15pro', name: 'iPhone 15 Pro',  w: 393,  h: 852 },
    { id: 'iphoneSE',    name: 'iPhone SE',      w: 375,  h: 667 },
    { id: 'pixel8',      name: 'Pixel 8',        w: 412,  h: 915 },
    { id: 'galaxyS24',   name: 'Galaxy S24',     w: 360,  h: 780 },
    { id: 'ipadMini',    name: 'iPad Mini',      w: 744,  h: 1133 },
  ];
  let mobileLock = null;
  let mobileShellEl = null;

  function buildMobileSrcdoc() {
    const clone = document.documentElement.cloneNode(true);
    // Strip StyleSession UI, styles, and scripts
    clone.querySelectorAll('#__vi-root, #__vi-styles, #__vi-session-style, #__vi-mobile-style, #__vi-snapshot-overlay').forEach(e => e.remove());
    clone.querySelectorAll('[id^="__vi"]').forEach(e => e.remove());
    clone.querySelectorAll('[class*="__vi-"]').forEach(e => {
      if (e.closest('[id^="__vi"]')) return;
      const stripped = Array.from(e.classList).filter(c => !c.startsWith('__vi-')).join(' ');
      if (stripped) e.className = stripped;
      else e.removeAttribute('class');
    });
    clone.querySelectorAll('script').forEach(s => {
      if (s.textContent.includes('StyleSession')) s.remove();
      if (s.src && s.src.includes('stylesession')) s.remove();
    });
    clone.querySelectorAll('link[href*="fonts.googleapis.com"][href*="Inter"]').forEach(e => e.remove());
    // Reset body overflow so page scrolls inside iframe
    const body = clone.querySelector('body');
    if (body) {
      body.style.overflow = '';
      body.style.background = '';
    }
    const html = clone.querySelector('html') || clone;
    if (html.style) html.style.overflow = '';
    return '<!DOCTYPE html>' + clone.outerHTML;
  }

  function applyDeviceSize(device) {
    currentDevice = device;
    if (!mobileShellEl) return;
    const vp = mobileShellEl.querySelector('.__vi-mobile-viewport');
    if (!vp) return;

    // Scale to fit available screen height
    const availH = window.innerHeight - 110;
    const availW = window.innerWidth - 120;
    const scaleH = availH / (device.h + 6);
    const scaleW = availW / (device.w + 6);
    const scale = Math.min(scaleH, scaleW, 1);

    vp.style.width  = device.w + 'px';
    vp.style.height = device.h + 'px';
    vp.style.transform = scale < 1 ? `scale(${scale.toFixed(3)})` : '';
    vp.style.transformOrigin = 'top center';

    // Update active button
    mobileShellEl.querySelectorAll('.__vi-mobile-device-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.deviceId === device.id);
    });
    // Update dimension label
    const label = mobileShellEl.querySelector('.__vi-mobile-device-label');
    if (label) label.textContent = `${device.w} × ${device.h}`;

    // Reload iframe content at new device size
    const iframe = vp.querySelector('.__vi-mobile-iframe');
    if (iframe) {
      iframe.srcdoc = buildMobileSrcdoc();
    }
  }

  function toggleMobileView() {
    state.features.mobile = !state.features.mobile;
    if (state.features.mobile) {
      mobileLock = {
        htmlOverflow: document.documentElement.style.overflow,
        bodyOverflow: document.body.style.overflow,

      xLabel.textContent = '×';
      xLabel.style.cssText = 'color:var(--vi-text-dim);font-size:10px;';

      hInput.type = 'number';
      hInput.className = '__vi-input';
      hInput.style.cssText = 'width:52px;padding:2px 4px;font-size:10px;text-align:center;';

        applyDeviceSize(custom);
      });
      customWrap.appendChild(wInput);
      customWrap.appendChild(xLabel);
      customWrap.appendChild(hInput);

      bar.appendChild(customWrap);
      const dimLabel = document.createElement('span');
      dimLabel.className = '__vi-mobile-device-label';
      bar.appendChild(dimLabel);

      // Phone frame with iframe

      iframe.sandbox = 'allow-same-origin allow-scripts';

      viewport.appendChild(iframe);
      mobileShellEl.appendChild(viewport);

      document.body.insertBefore(mobileShellEl, state.ui.root);
      applyDeviceSize(currentDevice);
      showToast(`${currentDevice.name} (${currentDevice.w}×${currentDevice.h})`, 'success');
    } else {
      // Restore everything
      if (mobileLock) {
        if (mobileShellEl) mobileShellEl.remove();
        mobileShellEl = null;

        document.documentElement.style.overflow = mobileLock.htmlOverflow;
        document.body.style.overflow = mobileLock.bodyOverflow;
        document.body.style.background = mobileLock.bodyBackground;
        window.scrollTo(mobileLock.scrollX, mobileLock.scrollY);

  function makeNote(x, y, text = '') {
    const note = document.createElement('div');
    note.className = '__vi-note';
    note.style.left = typeof x === 'number' ? x + 'px' : x;
    note.style.top = typeof y === 'number' ? y + 'px' : y;
    note.innerHTML = `<div class="__vi-note-drag" title="Drag to move"></div><textarea placeholder="Type note...">${escAttr(text)}</textarea><button class="__vi-note-close" title="Delete note">×</button>`;
    
    note.querySelector('.__vi-note-close').onclick = () => { note.remove(); autoSave(); };
    note.querySelector('textarea').addEventListener('input', autoSave);
    
    const drag = note.querySelector('.__vi-note-drag');
    drag.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      let startX = e.clientX, startY = e.clientY;
      let initLeft = parseFloat(note.style.left) || 0;
      let initTop = parseFloat(note.style.top) || 0;
      
      const move = (me) => {
        note.style.left = (initLeft + me.clientX - startX) + 'px';
        note.style.top = (initTop + me.clientY - startY) + 'px';
      };
      const up = () => {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up, true);
        autoSave();
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up, true);
    });
    
    document.getElementById('__vi-guides-container').appendChild(note);
    return note;
  }

  let annotationsActive = false;
  function toggleAnnotations() {
    annotationsActive = !annotationsActive;
    if (annotationsActive) {
      state.ui.root.style.cursor = 'crosshair';
      showToast('Click to drop a note');
      const drop = (e) => {
        if (!annotationsActive) { window.removeEventListener('click', drop, { capture: true }); return; }
        if (e.target.closest('#__vi-root')) return;
        makeNote(e.clientX, e.clientY + window.scrollY);
        toggleAnnotations();
        window.removeEventListener('click', drop, { capture: true });
        autoSave();
      };
      setTimeout(() => window.addEventListener('click', drop, { capture: true }), 100);
    } else {
      state.ui.root.style.cursor = '';
    }
  }

  let compareMode = false, tempCompareStyles = new Map();
  function toggleCompare() {
    compareMode = !compareMode;
    const btn = document.getElementById('__vi-btn-compare');
    if (compareMode) {
      btn.classList.add('active');
      state.originalStyles.forEach((propsMap, el) => {
        const cur = new Map();
        propsMap.forEach((oldVal, prop) => { cur.set(prop, el.style[prop]); el.style[prop] = oldVal; });
        tempCompareStyles.set(el, cur);
      });
      showToast('Viewing Original');
    } else {
      btn.classList.remove('active');
      tempCompareStyles.forEach((cur, el) => { cur.forEach((v, p) => { el.style[p] = v; }); });
      tempCompareStyles.clear();
      showToast('Viewing Edited');
    }
  }

  function bindMoreMenu() {
    const moreBtn = document.getElementById('__vi-btn-more');

    moreBtn.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('open'); });

    menu.querySelectorAll('.__vi-more-btn').forEach(btn => {
      btn.addEventListener('click', () => {

        if (a === 'ruler') toggleRulers();
        else if (a === 'layout') toggleLayoutInspector();
        else if (a === 'a11y') toggleA11yInspector();
        else if (a === 'palette') togglePalette();
        else if (a === 'mobile') toggleMobileView();
        else if (a === 'dark') toggleDarkMode();
        else if (a === 'note') toggleAnnotations();
        else if (a === 'snapshot') toggleSnapshot();
        else if (a === 'shortcuts') toggleShortcutsModal();
        else if (a === 'download') downloadSession();

    Object.keys(map).forEach(id => {

  // ============================================================
  // COMMAND PALETTE (enhanced — > for commands)
  // ============================================================
  let paletteOpen = false, searchResults = [], selectedResultIdx = 0;
  const palette = () => document.getElementById('__vi-palette');
  const paletteInput = () => document.getElementById('__vi-palette-input');
  const paletteResultsEl = () => document.getElementById('__vi-palette-results');

  function togglePalette(forceClose = false) {
    paletteOpen = forceClose ? false : !paletteOpen;
    if (paletteOpen) {
      palette().classList.add('open');
      paletteInput().value = ''; paletteResultsEl().innerHTML = '';
      setTimeout(() => paletteInput().focus(), 50);
    } else {
      palette().classList.remove('open');
      paletteInput().blur();
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const pi = paletteInput();
    if (!pi) return;
    pi.addEventListener('input', (e) => {
      const q = e.target.value;
      if (q.startsWith('>')) {
        // Command mode
        const cq = q.slice(1).trim().toLowerCase();
        const commands = [
          { name: 'Toggle Rulers', action: toggleRulers, shortcut: 'Shift+R' },
          { name: 'Toggle Layout Grid', action: toggleLayoutInspector, shortcut: 'Shift+L' },
          { name: 'A11y Scan', action: toggleA11yInspector, shortcut: 'Shift+A' },
          { name: 'Toggle Dark Mode', action: toggleDarkMode, shortcut: 'Shift+D' },
          { name: 'Toggle Mobile View', action: toggleMobileView, shortcut: 'Shift+M' },
          { name: 'Drop Note', action: toggleAnnotations, shortcut: 'Shift+N' },
          { name: 'Snapshot', action: toggleSnapshot, shortcut: 'Shift+S' },
          { name: 'Export CSS', action: () => generateCSSExport(false), shortcut: 'Ctrl+Shift+E' },
          { name: 'Save Session', action: () => generateCSSExport(true), shortcut: 'Ctrl+S' },
          { name: 'Download Session', action: downloadSession },
          { name: 'Reset to Default', action: resetToDefault },
          { name: 'Compare Original', action: toggleCompare, shortcut: 'Shift+C' },
          { name: 'Shortcuts Help', action: toggleShortcutsModal, shortcut: '?' },
          { name: 'Import Session', action: importSession },
          { name: 'Hidden Elements', action: showHiddenElements },
          { name: 'CSS Editor', action: toggleCSSEditor },
          { name: 'Undo History', action: showUndoHistory },
          { name: 'Copy Styles', action: copyElementStyles, shortcut: 'Ctrl+Alt+C' },
          { name: 'Paste Styles', action: pasteElementStyles, shortcut: 'Ctrl+Alt+V' },
          { name: 'Shape Tool', action: () => setTool('shape'), shortcut: 'G' },
        ];
        searchResults = commands.filter(c => c.name.toLowerCase().includes(cq));
        selectedResultIdx = 0;
        paletteResultsEl().innerHTML = searchResults.map((c, i) =>
          `<div class="__vi-palette-result ${i === selectedResultIdx ? 'active' : ''}" data-idx="${i}">⚡ ${c.name}${c.shortcut ? `<span class="shortcut">${c.shortcut}</span>` : ''}</div>`
        ).join('');
        paletteResultsEl().querySelectorAll('.__vi-palette-result').forEach(el => {
          el.addEventListener('click', () => {
            const cmd = searchResults[parseInt(el.dataset.idx, 10)];
            togglePalette(true);
            if (cmd && cmd.action) cmd.action();
          });
        });
        return;
      }

      // Element search mode
      if (q.length < 1) { paletteResultsEl().innerHTML = ''; return; }
      const all = Array.from(document.querySelectorAll('*')).filter(el => !el.closest('#__vi-root'));
      searchResults = all.filter(el => {
        let s = el.tagName.toLowerCase();
        if (el.id) s += '#' + el.id;
        if (el.className && typeof el.className === 'string') s += '.' + el.className.split(/\s+/).join('.');
        if (el.textContent) s += ' ' + el.textContent.slice(0, 50);
        return s.toLowerCase().includes(q.toLowerCase());
      }).slice(0, 15);
      selectedResultIdx = 0;
      renderPaletteResults();
    });

    pi.addEventListener('keydown', (e) => {
      if (!paletteOpen) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); selectedResultIdx = Math.min(selectedResultIdx + 1, searchResults.length - 1); renderOrCommandPaletteResults(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); selectedResultIdx = Math.max(selectedResultIdx - 1, 0); renderOrCommandPaletteResults(); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (pi.value.startsWith('>')) {
          const cmd = searchResults[selectedResultIdx];
          togglePalette(true);
          if (cmd && cmd.action) cmd.action();
        } else if (searchResults[selectedResultIdx]) {
          selectElementFromPalette(searchResults[selectedResultIdx]);
        }
      }
      else if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); togglePalette(true); document.body.focus(); }
    });
  });

  function renderOrCommandPaletteResults() {
    if (paletteInput().value.startsWith('>')) {
      paletteResultsEl().querySelectorAll('.__vi-palette-result').forEach((el, i) => el.classList.toggle('active', i === selectedResultIdx));
    } else {
      renderPaletteResults();
    }
  }

  function renderPaletteResults() {
    paletteResultsEl().innerHTML = searchResults.map((el, i) => {
      let name = el.tagName.toLowerCase();
      if (el.id) name += `<span style="color:#00E5CC">#${escAttr(el.id)}</span>`;
      else if (el.className && typeof el.className === 'string') {

      return `<div class="__vi-palette-result ${i === selectedResultIdx ? 'active' : ''}" data-idx="${i}">${name}</div>`;
    }).join('');
    paletteResultsEl().querySelectorAll('.__vi-palette-result').forEach(el => {
      el.addEventListener('click', () => selectElementFromPalette(searchResults[parseInt(el.dataset.idx, 10)]));

  }

  function downloadSession() {
    const data = collectSessionChanges();
    const textChanges = collectTextChanges();
    // Collect annotations
    const notes = [];
    document.querySelectorAll('.__vi-note').forEach(note => {
      const ta = note.querySelector('textarea');
      if (ta && ta.value.trim()) {
        notes.push({ x: note.style.left, y: note.style.top, text: ta.value });
      }
    });
    // Collect injected CSS
    const injectedStyle = document.getElementById('__vi-injected-css');
    const injectedCSS = injectedStyle ? injectedStyle.textContent : '';
    if (data.length === 0 && notes.length === 0 && !injectedCSS && textChanges.length === 0) { showToast('No data', 'warn'); return; }
    const payload = { version: 2, date: new Date().toISOString(), changes: data };
    if (notes.length > 0) payload.notes = notes;
    if (injectedCSS) payload.injectedCSS = injectedCSS;
    if (textChanges.length > 0) payload.textChanges = textChanges;
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'project.stylesession'; a.click();
    URL.revokeObjectURL(a.href);
    showToast('Session downloaded', 'success');
  }

  function loadSession() {
    const raw = localStorage.getItem('__vi_session');
    if (!raw) return;

    // Remove any previous legacy style tag to avoid stacking duplicate rules.
    const prev = document.getElementById('__vi-session-style');
    if (prev) prev.remove();

    let parsed = null;
    try { parsed = JSON.parse(raw); } catch (e) { parsed = null; }

    if (parsed && Array.isArray(parsed.changes)) {
      let applied = 0;
      parsed.changes.forEach(change => {
        if (!change || !change.selector || !change.styles) return;
        const matched = resolveSessionTargets(change);
        matched.forEach(el => {
          Object.entries(change.styles).forEach(([kebab, newVal]) => {
            const isCSSVar = kebab.startsWith('--');
            const prop = isCSSVar ? kebab : kebab.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
            const oldVal = isCSSVar
              ? (el.style.getPropertyValue(prop).trim() || window.getComputedStyle(el).getPropertyValue(prop).trim() || '')
              : (el.style[prop] || window.getComputedStyle(el)[prop] || '');
            if (!state.originalStyles.has(el)) state.originalStyles.set(el, new Map());
            const origMap = state.originalStyles.get(el);
            if (!origMap.has(prop)) origMap.set(prop, oldVal);
            if (isCSSVar) el.style.setProperty(prop, newVal);
            else el.style[prop] = newVal;
            state.undoStack.push({ el, prop, oldVal, newVal });
            applied++;
          });
        });
      });
      // Restore text content changes
      if (Array.isArray(parsed.textChanges)) {
        parsed.textChanges.forEach(tc => {
          const matched = resolveSessionTargets(tc);
          matched.forEach(el => {
            const oldText = el.textContent;
            if (oldText !== tc.text) {
              el.textContent = tc.text;
              state.undoStack.push({ el, prop: '__textContent', oldVal: oldText, newVal: tc.text });
              applied++;
            }
          });
        });
      }
      // Restore annotations
      if (Array.isArray(parsed.notes)) {
        const container = document.getElementById('__vi-guides-container');
        if (container) {
          parsed.notes.forEach(n => {
            makeNote(n.x, n.y, n.text);
          });
        }
      }
      // Restore injected CSS
      if (parsed.injectedCSS) {
        let s = document.getElementById('__vi-injected-css');
        if (!s) { s = document.createElement('style'); s.id = '__vi-injected-css'; document.head.appendChild(s); }
        s.textContent = parsed.injectedCSS;
      }
      state.redoStack = [];
      updateUndoRedoUI();
      if (applied > 0) showToast(`Session restored (${applied} changes)`, 'success');
      else showToast('Session found but no matching elements', 'warn');
      return;
    }

    // Backward compatibility: legacy CSS-only payload.
    const s = document.createElement('style');
    s.id = '__vi-session-style';
    s.textContent = raw;
    document.head.appendChild(s);
    showToast('Legacy session restored (history unavailable)', 'warn');
  }

  // Auto-save debounced
  let saveTimer = null;
  function autoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => generateCSSExport(true), 5000);
  }

  // ============================================================
  // SESSION IMPORT
  // ============================================================
  function importSession() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.stylesession,.json';
    inp.style.display = 'none';
    document.body.appendChild(inp);
    inp.addEventListener('change', () => {
      const file = inp.files[0];
      if (!file) { inp.remove(); return; }
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!parsed || !Array.isArray(parsed.changes)) {
            showToast('Invalid session file', 'error');
            return;
          }
          let applied = 0;
          parsed.changes.forEach(change => {
            if (!change || !change.styles) return;
            const matched = resolveSessionTargets(change);
            matched.forEach(el => {
              Object.entries(change.styles).forEach(([kebab, newVal]) => {
                const isCSSVar = kebab.startsWith('--');
                const prop = isCSSVar ? kebab : kebab.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
                if (isCSSVar) {
                  const oldVal = el.style.getPropertyValue(prop).trim() || window.getComputedStyle(el).getPropertyValue(prop).trim() || '';
                  if (!state.originalStyles.has(el)) state.originalStyles.set(el, new Map());
                  const origMap = state.originalStyles.get(el);
                  if (!origMap.has(prop)) origMap.set(prop, oldVal);
                  el.style.setProperty(prop, newVal);
                  state.undoStack.push({ el, prop, oldVal, newVal });
                  state.redoStack = [];
                  updateUndoRedoUI();
                } else {
                  applyChange(el, prop, newVal);
                }
                applied++;
              });
            });
          });
          // Restore text changes
          if (Array.isArray(parsed.textChanges)) {
            parsed.textChanges.forEach(tc => {
              const matched = resolveSessionTargets(tc);
              matched.forEach(el => {
                const oldText = el.textContent;
                if (oldText !== tc.text) {
                  el.textContent = tc.text;
                  state.undoStack.push({ el, prop: '__textContent', oldVal: oldText, newVal: tc.text });
                  state.redoStack = [];
                  applied++;
                }
              });
            });
          }
          if (applied > 0) showToast(`Imported ${applied} changes`, 'success');
          else showToast('No matching elements found', 'warn');
          // Restore annotations
          if (Array.isArray(parsed.notes)) {
            const container = document.getElementById('__vi-guides-container');
            if (container) {
              parsed.notes.forEach(n => {
                const note = document.createElement('div');
                note.className = '__vi-note';
                note.style.left = n.x; note.style.top = n.y;
                note.innerHTML = `<textarea placeholder="Type note...">${escAttr(n.text)}</textarea><button>×</button>`;
                container.appendChild(note);
                note.querySelector('button').onclick = () => note.remove();
              });
            }
          }
          // Restore injected CSS
          if (parsed.injectedCSS) {
            let s = document.getElementById('__vi-injected-css');
            if (!s) { s = document.createElement('style'); s.id = '__vi-injected-css'; document.head.appendChild(s); }
            s.textContent = parsed.injectedCSS;
          }
          renderPanelForCurrentTool();
        } catch (e) {
          showToast('Failed to parse session file', 'error');
        }
      };
      reader.readAsText(file);
      inp.remove();
    });
    inp.click();
  }

  // ============================================================
  // HIDDEN ELEMENTS PANEL
  // ============================================================
  function showHiddenElements() {
    const hidden = [];
    state.originalStyles.forEach((propsMap, el) => {
      if (el.style.display === 'none') {
        hidden.push(el);
      }
    });
    if (hidden.length === 0) {
      showToast('No hidden elements', 'warn');
      return;
    }
    state.features.hidden = !state.features.hidden;
    updateFeatureDots();
    // Build overlay panel
    let overlay = document.getElementById('__vi-hidden-panel');
    if (overlay) { overlay.remove(); state.features.hidden = false; updateFeatureDots(); return; }
    state.features.hidden = true;
    updateFeatureDots();
    overlay = document.createElement('div');
    overlay.id = '__vi-hidden-panel';
    overlay.style.cssText = 'position:fixed;top:80px;right:20px;width:260px;max-height:400px;overflow-y:auto;background:rgba(20,20,24,0.96);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;z-index:2147483610;font-family:var(--vi-font);color:var(--vi-text);font-size:11px;pointer-events:auto;backdrop-filter:blur(20px);';
    let html = '<div style="font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">Hidden Elements <button id="__vi-hidden-close" style="background:none;border:none;color:var(--vi-text-dim);cursor:pointer;font-size:14px;">✕</button></div>';
    hidden.forEach((el, i) => {
      const tag = el.tagName.toLowerCase();
      const id = el.id ? '#' + el.id : '';
      const cls = (el.className && typeof el.className === 'string') ? '.' + el.className.split(' ').filter(c => c && !c.startsWith('__vi')).slice(0, 2).join('.') : '';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="color:var(--vi-accent);">${escAttr(tag)}${escAttr(id)}${escAttr(cls)}</span>
        <button class="__vi-show-el-btn" data-idx="${i}" style="background:var(--vi-accent);color:#000;border:none;border-radius:4px;padding:2px 8px;font-size:9px;cursor:pointer;font-weight:600;">Show</button>
      </div>`;
    });
    html += `<button id="__vi-show-all-btn" style="width:100%;margin-top:8px;padding:6px;background:var(--vi-accent);color:#000;border:none;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;">Show All</button>`;
    overlay.innerHTML = html;
    state.ui.root.appendChild(overlay);
    overlay.querySelector('#__vi-hidden-close').addEventListener('click', () => { overlay.remove(); state.features.hidden = false; updateFeatureDots(); });
    overlay.querySelectorAll('.___vi-show-el-btn, .__vi-show-el-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const el = hidden[parseInt(btn.dataset.idx, 10)];
        if (el) { applyChange(el, 'display', ''); showToast('Element restored'); btn.closest('div').remove(); }
      });
    });
    overlay.querySelector('#__vi-show-all-btn').addEventListener('click', () => {
      hidden.forEach(el => applyChange(el, 'display', ''));
      overlay.remove();
      state.features.hidden = false;
      updateFeatureDots();
      showToast(`Restored ${hidden.length} elements`, 'success');
    });
  }

  // ============================================================
  // CSS EDITOR (page-level CSS injection)
  // ============================================================
  let cssEditorEl = null;
  function toggleCSSEditor() {
    state.features.csseditor = !state.features.csseditor;
    updateFeatureDots();
    if (!state.features.csseditor) {
      if (cssEditorEl) { cssEditorEl.remove(); cssEditorEl = null; }
      return;
    }
    cssEditorEl = document.createElement('div');
    cssEditorEl.id = '__vi-css-editor';
    cssEditorEl.style.cssText = 'position:fixed;bottom:20px;right:20px;width:360px;height:280px;background:rgba(20,20,24,0.97);border:1px solid rgba(255,255,255,0.08);border-radius:12px;z-index:2147483610;font-family:var(--vi-font);color:var(--vi-text);pointer-events:auto;display:flex;flex-direction:column;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.4);resize:both;overflow:hidden;';
    cssEditorEl.innerHTML = `<div style="padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;">
      <span style="font-weight:600;font-size:11px;">CSS Editor</span>
      <div style="display:flex;gap:6px;">
        <button id="__vi-css-apply" style="background:var(--vi-accent);color:#000;border:none;border-radius:4px;padding:3px 10px;font-size:9px;cursor:pointer;font-weight:600;">Apply</button>
        <button id="__vi-css-close" style="background:none;border:none;color:var(--vi-text-dim);cursor:pointer;font-size:14px;">✕</button>
      </div>
    </div>
    <textarea id="__vi-css-textarea" spellcheck="false" style="flex:1;background:rgba(0,0,0,0.3);color:#e0e0e0;border:none;padding:12px;font-family:var(--vi-mono);font-size:11px;resize:none;outline:none;tab-size:2;" placeholder="/* Write CSS rules here */\n.my-class {\n  color: red;\n}"></textarea>`;
    state.ui.root.appendChild(cssEditorEl);
    // Restore previous CSS
    let injectedStyle = document.getElementById('__vi-injected-css');
    if (injectedStyle) {
      cssEditorEl.querySelector('#__vi-css-textarea').value = injectedStyle.textContent;
    }
    cssEditorEl.querySelector('#__vi-css-close').addEventListener('click', () => {
      state.features.csseditor = false;
      updateFeatureDots();
      cssEditorEl.remove();
      cssEditorEl = null;
    });
    cssEditorEl.querySelector('#__vi-css-apply').addEventListener('click', () => {
      const css = cssEditorEl.querySelector('#__vi-css-textarea').value;
      let s = document.getElementById('__vi-injected-css');
      if (!s) { s = document.createElement('style'); s.id = '__vi-injected-css'; document.head.appendChild(s); }
      s.textContent = css;
      showToast('CSS applied', 'success');
    });
    // Tab key support in textarea
    cssEditorEl.querySelector('#__vi-css-textarea').addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 2;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        cssEditorEl.querySelector('#__vi-css-apply').click();
      }
      e.stopPropagation();
    });
  }

  // ============================================================
  // UNDO HISTORY PANEL
  // ============================================================
  function showUndoHistory() {
    let overlay = document.getElementById('__vi-history-panel');
    if (overlay) { overlay.remove(); return; }
    overlay = document.createElement('div');
    overlay.id = '__vi-history-panel';
    overlay.style.cssText = 'position:fixed;top:80px;left:20px;width:300px;max-height:500px;overflow-y:auto;background:rgba(20,20,24,0.96);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;z-index:2147483610;font-family:var(--vi-font);color:var(--vi-text);font-size:11px;pointer-events:auto;backdrop-filter:blur(20px);';
    const stack = state.undoStack;
    let html = '<div style="font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">Undo History (' + stack.length + ')<button id="__vi-history-close" style="background:none;border:none;color:var(--vi-text-dim);cursor:pointer;font-size:14px;">✕</button></div>';
    if (stack.length === 0) {
      html += '<div style="color:var(--vi-text-dim);padding:8px 0;">No changes yet</div>';
    } else {
      // Show most recent first
      for (let i = stack.length - 1; i >= 0; i--) {
        const cmd = stack[i];
        const tag = cmd.el.tagName ? cmd.el.tagName.toLowerCase() : '?';
        const id = cmd.el.id ? '#' + cmd.el.id : '';
        const prop = cmd.prop.replace(/[A-Z]/g, m => '-' + m.toLowerCase());
        const val = (cmd.newVal || '').slice(0, 30);
        html += `<div class="__vi-history-item" data-idx="${i}" style="padding:6px 4px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;display:flex;gap:6px;align-items:baseline;" title="Click to undo to this point">
          <span style="color:var(--vi-text-dim);font-size:9px;min-width:18px;">${i + 1}</span>
          <span style="color:var(--vi-accent);flex-shrink:0;">${escAttr(tag)}${escAttr(id)}</span>
          <span style="color:var(--vi-orange);">${escAttr(prop)}</span>
          <span style="color:var(--vi-text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escAttr(val)}</span>
        </div>`;
      }
    }
    overlay.innerHTML = html;
    state.ui.root.appendChild(overlay);
    overlay.querySelector('#__vi-history-close').addEventListener('click', () => overlay.remove());
    overlay.querySelectorAll('.__vi-history-item').forEach(item => {
      item.addEventListener('click', () => {
        const idx = parseInt(item.dataset.idx, 10);
        // Undo everything after this index
        while (state.undoStack.length > idx + 1) undo();
        overlay.remove();
        showToast(`Reverted to step ${idx + 1}`, 'success');
      });
    });
  }

  // ============================================================
  // COPY / PASTE STYLES
  // ============================================================
  let copiedStyles = null;
  function copyElementStyles() {
    if (state.selectedEls.length === 0) { showToast('Select an element first', 'warn'); return; }
    const el = state.selectedEls[0];
    const cs = window.getComputedStyle(el);
    const props = ['color','backgroundColor','fontSize','fontFamily','fontWeight','lineHeight','letterSpacing',
      'textAlign','textTransform','textDecorationLine','padding','margin','borderRadius','border',
      'boxShadow','textShadow','opacity','display','gap','width','height','transform','filter',
      'backdropFilter','mixBlendMode','overflow','cursor','background','position'];
    copiedStyles = {};
    let usedComputed = false;
    props.forEach(p => {
      const v = el.style[p];
      if (v) copiedStyles[p] = v;
    });
    // Fall back to computed styles if no inline styles found
    if (Object.keys(copiedStyles).length === 0) {
      props.forEach(p => {
        const v = cs[p];
        if (v && v !== '' && v !== 'none' && v !== 'normal' && v !== 'auto') copiedStyles[p] = v;
      });
      usedComputed = true;
    }
    if (Object.keys(copiedStyles).length === 0) {
      showToast('No styles to copy', 'warn');
      copiedStyles = null;
      return;
    }
    showToast(`Copied ${Object.keys(copiedStyles).length} styles${usedComputed ? ' (computed)' : ''}`, 'success');
  }

  function pasteElementStyles() {
    if (!copiedStyles) { showToast('No styles copied', 'warn'); return; }
    if (state.selectedEls.length === 0) { showToast('Select target element(s)', 'warn'); return; }
    let count = 0;
    state.selectedEls.forEach(el => {
      Object.entries(copiedStyles).forEach(([prop, val]) => {
        applyChange(el, prop, val);
        count++;
      });
    });
    showToast(`Pasted ${count} styles`, 'success');
    renderPanelForCurrentTool();
  }

  // ============================================================
  // INLINE TEXT EDITING
  // ============================================================
  let inlineEditEl = null;
  function initInlineTextEditing() {
    state.ui.root.addEventListener('dblclick', (e) => {
      if (!state.active) return;
      const target = e.target;
      if (target.closest('#__vi-root')) return;
      // Only edit leaf text nodes
      if (target.children.length > 0 && target.textContent.trim() !== target.innerText.trim()) return;
      e.preventDefault();
      e.stopPropagation();
      startInlineEdit(target);
    }, true);
  }

  function startInlineEdit(el) {
    if (inlineEditEl) finishInlineEdit();
    inlineEditEl = el;
    const oldText = el.textContent;
    el.contentEditable = 'true';
    el.focus();
    el.style.outline = '2px solid var(--vi-accent)';
    el.style.outlineOffset = '2px';
    const onKeyDown = (e) => {
      if (e.key === 'Escape') { el.textContent = oldText; el.blur(); }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
      e.stopPropagation();
    };
    
    const finish = () => {
      if (!inlineEditEl) return;
      el.removeEventListener('keydown', onKeyDown);
      el.contentEditable = 'false';
      el.style.outline = '';
      el.style.outlineOffset = '';
      const newText = el.textContent;
      if (newText !== oldText) {
        // Track text change in undo stack
        state.undoStack.push({ el, prop: '__textContent', oldVal: oldText, newVal: newText });
        state.redoStack = [];
        updateUndoRedoUI();
        showToast('Text updated');
      }
      inlineEditEl = null;
    };
    el.addEventListener('blur', finish, { once: true });
    el.addEventListener('keydown', onKeyDown);
  }

  function finishInlineEdit() {
    if (inlineEditEl) {
      inlineEditEl.contentEditable = 'false';
      inlineEditEl.style.outline = '';
      inlineEditEl.style.outlineOffset = '';
      inlineEditEl = null;
    }
  }

  // ============================================================
  // BOOTSTRAP
  // ============================================================
  init();

  // Hook autosave into undo stack changes
  const origPush = state.undoStack.push;
  state.undoStack.push = function(...args) {
    const result = origPush.apply(this, args);
    autoSave();
    return result;
  };

})();
</script>
